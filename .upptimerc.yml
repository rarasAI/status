owner: rarasAI
repo: status

sites:
  - name: Raras (site)
    url: https://raras.org
  - name: API Assistente
    url: https://raras.org/api/health
    method: GET
    expectedStatusCodes:
      - 200
      - 404
  - name: Cloud Run (raras-app)
    url: https://raras-app-669720154102.southamerica-east1.run.app/

status-website:
  baseUrl: /status
  logoUrl: https://raras.org/logo-raras-rodape.png
  name: Status Raras
  introTitle: "**Status Raras** — uptime e incidentes da plataforma raras.org."
  introMessage: Esta página é atualizada automaticamente a cada 5 minutos via GitHub Actions. Histórico de incidentes e janelas de manutenção ficam registrados como issues no [repositório](https://github.com/rarasAI/status).
  navbar:
    - title: Status
      href: /
    - title: raras.org
      href: https://raras.org
    - title: GitHub
      href: https://github.com/rarasAI/status

assignees:
  - dimas-timmers

